version: '3.8'

# Development overrides - automatically loaded with docker-compose up
services:
  app:
    build:
      args:
        - BUILD_ENV=development
    volumes:
      # Mount source code for live reload
      - .:/var/www/html
      # Persist data volume
      - simplemappr_data:/var/lib/simplemappr
      # Exclude vendor to use container's installed packages
      - /var/www/html/vendor
    environment:
      - ENVIRONMENT=development
      - XDEBUG_MODE=develop,debug
      - XDEBUG_CONFIG=client_host=host.docker.internal
    ports:
      - "8080:80"

  render:
    volumes:
      # Mount render source for development
      - ./render:/app
      - ./mapserver/fonts:/app/mapserver/fonts
      - ./mapserver/maps:/app/mapserver/maps:ro
