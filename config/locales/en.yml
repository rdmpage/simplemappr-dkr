  # Help page
  help:
    title: Help
    browser_note: This application makes heavy use of JavaScript. A modern browser like Chrome, Firefox, Safari, or Edge is strongly recommended.
    preview_section: Preview
    preview_help: Use the Preview tab to refine your eventual map export by adjusting various options, downloading the result, or saving it for later re-use (when logged in)
    toolbar_buttons: Toolbar buttons
    zoom_in_help: draw a zoom region on the preview
    zoom_out_help: zoom out one step
    crop_help: draw an expandable, square-shaped rubber band that precisely defines a cropped portion of the map you wish to appear in the exported map.
    fill_regions_help: choose a color then draw an expandable, square-shaped rubber band to shade States/Provinces (if layer visible) or Countries. Selections are sequentially added in the Regions tab.
    undo_help: undo the last executed action
    redo_help: redo the last executed action
    refresh_help: refresh the map image
    rebuild_help: re-render the default presentation at lowest zoom and geographic projection
    save_help: while logged in, click this icon to give your map a title and save its settings for later reuse from the My Maps tab.
    embed_help: once a map is saved, click this icon to obtain a URL for embedding on other websites.
    download_help: choose from a web-friendly png, high resolution tif, pptx (PowerPoint), docx (Word), kml (Google Earth) or scalable vector graphic (svg). The latter is recommended for the preparation of figures in manuscripts because it is lossless.
    point_data_section: Point Data
    point_data_help: Use the Point Data tab to paste coordinates as latitude, longitude either in decimal degrees or as DD°MM'SS" on separate lines and select the marker shape, size, and color.
    coordinate_format: Coordinate format
    coordinate_format_help: "in western hemisphere above equator 45.55, -120.25 (or 45° 33'N, 120° 15'W); in western hemisphere below equator -15.66, -65.10; eastern hemisphere above equator 64.82, 75.1"
    example_data: Example Data Entry
    example_na: 38,-100 (North America)
    example_au: -25,140 (Australia)
    pushpin_color: Pushpin color
    pushpin_color_help: configured using the RGB color scheme and a color selector is provided. By default, "0 0 0" (black) is selected.
    regions_section: Regions
    regions_help: Use the Regions tab to list political regions you would like shaded and select the shade color.

  # About page
  about:
    title: About
    description: Create greyscale point maps suitable for reproduction on print media by copying and pasting geographic coordinates in layers, choosing pushpin styles, then downloading the result.
    citing: Citing
    citing_text: All versions of SimpleMappr map data found on this website are in the Public Domain. You may use the maps in any manner, including modifying the content and design, electronic dissemination, and offset printing.
