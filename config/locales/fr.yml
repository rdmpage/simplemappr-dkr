  # Help page
  help:
    title: Aide
    browser_note: Cette application fait un usage intensif de JavaScript. Un navigateur moderne comme Chrome, Firefox, Safari ou Edge est fortement recommandée.
    preview_section: Aperçu
    preview_help: Utiliser l'onglet Aperçu pour affiner votre carte en ajustant les différentes options, télécharger le résultat, ou l'enregistrer pour réutilisation ultérieure (lorsque vous êtes connecté)
    toolbar_buttons: Boutons
    zoom_in_help: dessiner une région de zoom sur l'aperçu
    zoom_out_help: dézoomer une étape
    crop_help: dessiner une extensible, élastique en forme de carré qui définit précisément une partie recadrée de la carte que vous souhaitez voir apparaître dans la carte exportée.
    fill_regions_help: choisissez une couleur puis tracez une extensible, élastique en forme de carré à l'ombre des États/provinces (si la couche visible) ou des pays.
    undo_help: annuler la dernière action
    redo_help: rétablir la dernière action
    refresh_help: régénérer la carte
    rebuild_help: rendre la présentation par défaut au plus bas de zoom et projection géographique
    save_help: en étant connecté, cliquer sur cette icône pour donner votre carte un titre et enregistrer ses paramètres.
    embed_help: une fois qu'une carte est enregistrée, cliquer sur cette icône pour obtenir une URL pour l'intégration sur d'autres sites.
    download_help: choisir png, tif à haute résolution, pptx (PowerPoint), docx (Word), kml (Google Earth) ou scalable vector graphic (svg). Ce dernier est recommandé pour la préparation des figures dans les manuscrits.
    point_data_section: Points de Données
    point_data_help: Utiliser l'onglet Points de Données pour coller des coordonnées latitude, longitude en degrés décimaux ou DD°MM'SS" sur des lignes séparées et sélectionner la forme de marqueur, la taille et la couleur.
    coordinate_format: Format de coordonnées
    coordinate_format_help: "dans l'hémisphère occidental dessus de l'équateur 45.55, -120.25 (ou 45° 33'N, 120° 15'W); dans l'hémisphère occidental dessous de l'équateur -15.66, -65.10; hémisphère oriental dessus de l'équateur 64.82, 75.1"
    example_data: Exemple de données
    example_na: 38,-100 (l'Amérique du Nord)
    example_au: -25,140 (Australie)
    pushpin_color: Couleur du marqueur
    pushpin_color_help: configuré en utilisant le schéma de couleurs RGB et un sélecteur de couleur est fourni. Par défaut, "0 0 0" (noir) est sélectionné.
    regions_section: Régions
    regions_help: Utiliser l'onglet Régions pour taper une liste des régions politiques que vous aimeriez ombragé et sélectionner la couleur d'ombre.

